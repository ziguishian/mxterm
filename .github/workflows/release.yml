name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build source distribution and wheel
        run: |
          python -m pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: mxterm-python-dist
          path: dist/*

  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependencies
        run: python -m pip install -e .[build]
      - name: Build binary
        run: python scripts/release/build_binary.py
      - name: Package artifact
        run: python scripts/release/package_artifacts.py
      - uses: actions/upload-artifact@v4
        with:
          name: mxterm-${{ matrix.os }}
          path: dist/release/*

  release:
    runs-on: ubuntu-latest
    needs: [build-python, build-binaries]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Show release assets
        run: find release-assets -maxdepth 2 -type f | sort
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
      - name: Publish to PyPI
        if: ${{ vars.MXTERM_PUBLISH_PYPI == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-assets/mxterm-python-dist
